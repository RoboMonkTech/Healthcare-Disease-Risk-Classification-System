<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Disease Risk Classification</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left-panel">

        <h1>Healthcare Disease Risk Classification</h1>

        <p class="subtitle">
            Machine Learning Based Disease Risk Prediction
        </p>

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" id="name" placeholder="Enter Patient Name">
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age">
        </div>

        <div class="form-group">
            <label>Gender</label>

            <select id="sex">
                <option>Male</option>
                <option>Female</option>
            </select>

        </div>

        <div class="form-group">

            <label>Chest Pain Type</label>

            <select id="cp">

                <option>Typical Angina</option>
                <option>Atypical Angina</option>
                <option>Non Anginal Pain</option>
                <option>Asymptomatic</option>

            </select>

        </div>

        <div class="form-group">

            <label>Resting Blood Pressure</label>

            <input type="number" id="bp">

        </div>

        <div class="form-group">

            <label>Cholesterol</label>

            <input type="number" id="chol">

        </div>

        <div class="form-group">

            <label>Fasting Blood Sugar</label>

            <select id="sugar">

                <option>Normal</option>
                <option>High</option>

            </select>

        </div>

        <div class="form-group">

            <label>Maximum Heart Rate</label>

            <input type="number" id="hr">

        </div>

        <div class="form-group">

            <label>Exercise Angina</label>

            <select id="angina">

                <option>No</option>
                <option>Yes</option>

            </select>

        </div>

        <div class="form-group">

            <label>Oldpeak</label>

            <input type="number" step="0.1" id="oldpeak">

        </div>

        <button onclick="predictDisease()">

            Predict Disease Risk

        </button>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <h2>Prediction Result</h2>

        <div class="result-card">

            <div class="emoji" id="emoji">

                🩺

            </div>

            <h3 id="result">

                Waiting for Prediction...

            </h3>

            <p id="confidence">

                Confidence : --

            </p>

            <p id="recommendation">

                Enter patient details and click Predict Disease Risk.

            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
